[package]
name = "horsenuggets/assetfile"
description = "Finally, a way to work with Roblox assets local to your computer."
version = "0.1.1"
private = true
license = "MIT"
realm = "shared"
registry = "https://github.com/UpliftGames/wally-index"
repository = "https://github.com/horsenuggets/assetfile"

[dependencies]
Chalk = "horsenuggets/chalk-luau@1.0.1"
Commandline = "horsenuggets/commandline-luau@0.2.2"
Dotenv = "horsenuggets/dotenv-luau@0.1.4"
HashLib = "horsenuggets/hashlib@0.0.3"
t = "horsenuggets/t@3.1.1-horse.0.4"

[dev-dependencies]
Testable = "horsenuggets/testable@1.1.3"
